<!DOCTYPE html>
<html>
<head>
    <title>Artist Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a0c10; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #7ee787; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 12px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #1f2a3e; color: #7ee787; }
        .upload-area { background: #161b22; border: 2px dashed #30363d; border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .btn { padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-block; }
        .download { background: #238636; color: white; }
        .delete { background: #f85149; color: white; border: none; cursor: pointer; }
        .logout { background: #f85149; color: white; padding: 10px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome, {{ artist }}!</h1>
        <a href="/logout" class="logout">Logout</a>
        
        <div class="upload-area" id="dropzone">
            📤 Drag & drop or click to upload
        </div>
        <input type="file" id="fileInput" style="display:none;">
        
        <table>
            <thead><tr><th>File</th><th>Size</th><th>Actions</th></tr></thead>
            <tbody>
                {% for file in files %}
                <tr>
                    <td>{{ file.name }}</td>
                    <td>{{ file.size_str }}</td>
                    <td>
                        <a href="/download/{{ file.name }}" class="btn download">Download</a>
                        <form method="POST" action="/delete/{{ file.name }}" style="display:inline;">
                            <button type="submit" class="btn delete">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        dropzone.onclick = () => fileInput.click();
        dropzone.ondragover = (e) => e.preventDefault();
        dropzone.ondrop = (e) => {
            e.preventDefault();
            for(let file of e.dataTransfer.files) {
                let fd = new FormData();
                fd.append('file', file);
                fetch('/upload', { method: 'POST', body: fd }).then(() => location.reload());
            }
        };
        fileInput.onchange = () => {
            for(let file of fileInput.files) {
                let fd = new FormData();
                fd.append('file', file);
                fetch('/upload', { method: 'POST', body: fd }).then(() => location.reload());
            }
        };
    </script>
</body>
</html>

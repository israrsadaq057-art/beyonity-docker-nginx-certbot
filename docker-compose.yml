version: '3.8'

services:
  flask:
    build: .
    container_name: beyonity-flask
    restart: always
    volumes:
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - app-network
    environment:
      - FLASK_ENV=production

  nginx:
    image: nginx:alpine
    container_name: beyonity-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - flask
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: beyonity-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  app-network:
    driver: bridge

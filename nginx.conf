events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream flask_app {
        server flask:5000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/portal.beyonity.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/portal.beyonity.com/privkey.pem;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /artists/ {
            proxy_pass https://beyonity-3d-assets-prod-945504685795.s3.amazonaws.com/artists/;
            proxy_set_header Host beyonity-3d-assets-prod-945504685795.s3.amazonaws.com;
        }
    }
}
